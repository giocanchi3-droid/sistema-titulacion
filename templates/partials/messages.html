{% if messages %}
<div class="messages-container">
    {% for message in messages %}
        <div class="app-alert">
            <div class="alert-icon">
                {% if message.tags == "error" %}
                    !
                {% elif message.tags == "success" %}
                    ✓
                {% else %}
                    i
                {% endif %}
            </div>

            <div class="alert-content">
                {{ message }}
            </div>

            <button
                type="button"
                class="alert-close"
                data-alert-close
                aria-label="Cerrar mensaje"
            >
                ×
            </button>
        </div>
    {% endfor %}
</div>
{% endif %}
