{% extends "base.html" %}

{% block title %}
    Iniciar sesión
{% endblock %}


{% block public_content %}

<div class="flex min-h-screen items-center justify-center bg-slate-900 px-4">

    <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl">

        <div class="mb-8 text-center">

            <p class="text-sm font-semibold uppercase tracking-widest text-blue-700">
                PUCE TEC
            </p>

            <h1 class="mt-2 text-2xl font-bold">
                Sistema de Titulación
            </h1>

            <p class="mt-2 text-sm text-slate-500">
                Acceso para usuarios registrados
            </p>

        </div>

        {% if form.errors %}

            <div class="mb-4 rounded-lg bg-red-100 p-3 text-sm text-red-700">
                Usuario o contraseña incorrectos.
            </div>

        {% endif %}

        <form
            method="post"
            class="space-y-5"
        >

            {% csrf_token %}

            <div>

                <label
                    for="id_username"
                    class="font-semibold"
                >
                    Usuario
                </label>

                <input
                    type="text"
                    name="username"
                    id="id_username"
                    autofocus
                    required
                    class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2"
                >

            </div>

            <div>

                <label
                    for="id_password"
                    class="font-semibold"
                >
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    id="id_password"
                    required
                    class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2"
                >

            </div>

            <button
                type="submit"
                class="btn-primary w-full"
            >
                Iniciar sesión
            </button>

        </form>

    </div>

</div>

{% endblock %}
